<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>OpenClaw 智能聊天</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
    #messages { border: 1px solid #ddd; height: 400px; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    .message { padding: 8px; margin: 5px 0; border-radius: 4px; }
    .user { background: #e3f2fd; }
    .assistant { background: #f5f5f5; }
    input { width: 80%; padding: 10px; }
    button { padding: 10px 20px; }
    #status { color: #666; font-size: 12px; margin-bottom: 10px; }
  </style>
</head>
<body>
  <h1>🦞 OpenClaw 智能聊天</h1>
  <div id="status">连接中...</div>
  <div id="messages"></div>
  <input id="input" placeholder="输入消息..." autofocus>
  <button onclick="send()">发送</button>
  
  <script>
    const API = window.location.origin;
    const msgs = document.getElementById('messages');
    const input = document.getElementById('input');
    const status = document.getElementById('status');
    
    function addMsg(role, text) {
      const div = document.createElement('div');
      div.className = 'message ' + role;
      div.textContent = (role === 'user' ? '你: ' : '助手: ') + text;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }
    
    async function send() {
      const text = input.value.trim();
      if (!text) return;
      addMsg('user', text);
      input.value = '';
      
      status.textContent = '处理中...';
      try {
        const res = await fetch(API + '/api/chat/send', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({message: text})
        });
        const data = await res.json();
        status.textContent = 'scene: ' + (data.scene || 'unknown');
        addMsg('assistant', data.reply || JSON.stringify(data));
      } catch (e) {
        addMsg('assistant', '错误: ' + e.message);
      }
    }
    
    input.addEventListener('keypress', e => { if (e.key === 'Enter') send(); });
    status.textContent = '已连接 (3105 智能入口)';
  </script>
</body>
</html>
