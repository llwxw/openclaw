parameters:
  SPAWN_ON:
    description: 高于此值派发新任务。滞环上限。
    current: 36
    min: 15
    max: 40
    safe_range: 15-30
    theory: 钱学森第十一章：滞环控制，spawn_on<spawn_off，防止触发倒置
  SPAWN_OFF:
    description: 低于此值停止派发。滞环下限。
    current: 29
    min: 10
    max: 35
    safe_range: 15-28
    theory: 钱学森第十一章：滞环宽度=ON-OFF=5，spawn_on<spawn_off
  MAX_CONCURRENT_TASKS:
    description: 系统最大并发容量。n = q/max_c 的分母。
    current: 31
    min: 2
    max: 50
    safe_range: 5-15
    theory: n小于0.5即绝对稳定，提高容量等于降低负载率
  SCORE_THRESHOLD:
    description: 任务评分阈值，高于此分数才派发。
    current: 40
    min: 20
    max: 60
    safe_range: 25-50
    theory: 过滤低质量任务，保护系统
  CRON_INTERVAL_SECONDS:
    description: 采样间隔。越短越敏感但开销越大。
    current: 60
    min: 10
    max: 300
    safe_range: 30-120
    theory: 采样频率应高于系统变化频率2倍
